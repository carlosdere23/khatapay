<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel</title>
  <style>
    /* Modern CSS Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    :root {
      --primary: #4a90e2;
      --primary-hover: #357abd;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #3b82f6;
      --background: #000;  /* Black background */
      --surface: #111;
      --surface-2: #222;
      --surface-3: #333;
      --border: #444;
      --text: #fff;       /* White text */
      --text-secondary: #aaa;
      --transition: all 0.3s ease;
    }
    body {
      background: var(--background);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 20px;
      margin: 0;
      line-height: 1.5;
    }
    /* Layout */
    #loginForm, #adminContent {
      max-width: 1200px;
      margin: 0 auto;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.5s ease forwards;
    }
    #adminContent {
      display: none;
    }
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    /* Header */
    .header-buttons {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      align-items: center;
      padding: 1rem;
      background: var(--surface-2);
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    /* Buttons */
    button {
      background: var(--primary);
      border: none;
      color: var(--text);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 8px;
      font-weight: 500;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.1);
      transform: translate(-50%, -50%) scale(0);
      border-radius: 50%;
      transition: transform 0.5s;
    }
    button:hover::before {
      transform: translate(-50%, -50%) scale(2);
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
    }
    button:disabled {
      background: var(--surface-3);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    /* Forms */
    .generate-link {
      background: var(--surface-2);
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      transition: var(--transition);
    }
    .generate-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 12px rgba(0, 0, 0, 0.4);
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      background: var(--surface-3);
      color: var(--text);
      border-radius: 6px;
      transition: var(--transition);
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.3);
    }
  </style>
</head>
<body>
  <!-- Login Form -->
  <div id="loginForm">
    <h1>Admin Login</h1>
    <form onsubmit="return doLogin(event);">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="adminUsername" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="adminPassword" required>
      </div>
      <button type="submit" id="loginButton">Login</button>
    </form>
  </div>

  <!-- Admin Content -->
  <div id="adminContent">
    <div class="header-buttons">
      <div>
        <button onclick="logout()">Logout</button>
        <button onclick="deleteHistory()">Delete History</button>
        <button onclick="showProfile()">User Profile</button>
      </div>
      <div>
        Welcome, <span id="adminUser"></span>
      </div>
    </div>

    <div class="generate-link">
      <h2>Generate Payment Link</h2>
      <form id="generateLinkForm">
        <div class="form-group">
          <label>Amount (INR)</label>
          <input type="number" id="amount" required min="1" step="1">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="description" rows="2" required></textarea>
        </div>
        <button type="submit" id="generateButton">Generate Link</button>
      </form>
      <div id="paymentLinkContainer" class="payment-link">
        <span>Payment Link: </span>
        <span id="paymentLink"></span>
        <button class="copy-btn" onclick="copyPaymentLink()">Copy</button>
      </div>
    </div>
  </div>

  <script>
    // Admin credentials and login handling
    const validUsername = "admin";
    const validPassword = "password";
    let currentPassword = validPassword;

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }

    function setLoading(button, isLoading) {
      if (isLoading) {
        button.classList.add('loading');
        button.disabled = true;
      } else {
        button.classList.remove('loading');
        button.disabled = false;
      }
    }

    async function doLogin(e) {
      e.preventDefault();
      const loginButton = document.getElementById('loginButton');
      setLoading(loginButton, true);
      const username = document.getElementById('adminUsername').value;
      const password = document.getElementById('adminPassword').value;
      await new Promise(resolve => setTimeout(resolve, 800));
      if (username === validUsername && password === currentPassword) {
        localStorage.setItem("adminLoggedIn", "true");
        document.getElementById('adminUser').textContent = username;
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        showToast('Login successful');
      } else {
        showToast('Invalid credentials', 'error');
      }
      setLoading(loginButton, false);
      return false;
    }

    function logout() {
      localStorage.removeItem("adminLoggedIn");
      showToast('Logged out successfully');
      setTimeout(() => location.reload(), 1000);
    }

    async function deleteHistory() {
      if (confirm("Are you sure you want to delete all transaction history?")) {
        transactions = [];
        await new Promise(resolve => setTimeout(resolve, 500));
        loadTransactions();
        showToast('Transaction history deleted successfully');
      }
    }

    // Payment link generation
    async function generateLink(e) {
      e.preventDefault();
      const amount = document.getElementById('amount').value;
      const description = document.getElementById('description').value;
      const pid = "generated_pid"; // Replace with dynamic generation of payment link

      // Ensure it's using HTTPS
      const link = `https://www.khatapay.me/payment.html?pid=${pid}&amount=${amount}&description=${description}`;
      try {
        document.getElementById('paymentLink').textContent = link;
        document.getElementById('paymentLinkContainer').style.display = 'flex';
        showToast('Payment link generated successfully');
      } catch (error) {
        showToast('Error generating payment link', 'error');
      }
    }

    document.getElementById('generateLinkForm').addEventListener('submit', generateLink);

    async function copyPaymentLink() {
      const link = document.getElementById('paymentLink').textContent;
      await navigator.clipboard.writeText(link);
      showToast('Payment link copied to clipboard');
    }

    window.onload = function() {
      const loggedIn = localStorage.getItem('adminLoggedIn') === 'true';
      if (loggedIn) {
        document.getElementById('adminUser').textContent = validUsername;
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
      }
    };
  </script>
</body>
</html>
